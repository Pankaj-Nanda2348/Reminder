name: Daily Auto Commit

on:
  schedule:
    - cron: '55 11 * * *'   # Runs daily at 10:00 UTC
  workflow_dispatch:       # Allows manual trigger (important for testing)

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 21f1002348@ds.study.iitm.ac.in - Create daily update
        run: |
          echo "Last updated on $(date)" >> daily-log.txt
          
      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add daily-log.txt
          git commit -m "Daily automated commit"
          git push
